# EC2-004 EC2 LaunchTemplate without IMDSv2 required based on cspm/builtinRules/EC2-004 fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: EC2-004 EC2 instance via LaunchTemplate without IMDSv2 required (non-compliant)

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select a subnet for the instance

Resources:
  LaunchTemplateWithoutImdsv2:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${AWS::StackName}-no-imdsv2'
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        InstanceType: t3.micro
        NetworkInterfaces:
          - DeviceIndex: 0
            SubnetId: !Ref SubnetId
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Project
                Value: wiz-c2c-cloudformation
              - Key: Rule
                Value: EC2-004
