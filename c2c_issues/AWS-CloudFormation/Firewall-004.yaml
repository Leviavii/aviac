# Firewall-004 - SG allows unrestricted MongoDB access (tcp/27017-27020) from 0.0.0.0/0 - based on cspm/builtinRules/Firewall-004/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'c2c CloudFormation - Firewall-004: SG allows unrestricted MongoDB access (tcp/27017-27020) from 0.0.0.0/0'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the security group

Resources:
  C2cFirewall004:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} - Unrestricted MongoDB access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27020
          CidrIp: 0.0.0.0/0
          Description: Unrestricted MongoDB access
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: Firewall-004
        - Key: Name
          Value: !Sub '${AWS::StackName}-Firewall-004'
