# VirtualMachines-033 — Lightsail instance with SSH port 22 open to 0.0.0.0/0 — based on cspm/builtinRules/VirtualMachines-033 fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: VirtualMachines-033 - Lightsail instance allowing all IPs SSH access (non-compliant)

Resources:
  LightsailInstanceSshOpen:
    Type: AWS::Lightsail::Instance
    Properties:
      InstanceName: !Sub '${AWS::StackName}-ssh-open-instance'
      BlueprintId: amazon_linux_2
      BundleId: nano_3_0
      AvailabilityZone: !Sub '${AWS::Region}a'
      Networking:
        Ports:
          - FromPort: 22
            ToPort: 22
            Protocol: tcp
            AccessDirection: inbound
            Cidrs:
              - 0.0.0.0/0
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: VirtualMachines-033
