# S3-012 S3 bucket should have all Block Public Access settings enabled based on cspm/builtinRules/S3-012/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3-012: S3 bucket with BlockPublicAcls set to false (triggers missing/incomplete Block Public Access)'

Resources:
  S3012Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'c2c-s3-012-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: S3-012
