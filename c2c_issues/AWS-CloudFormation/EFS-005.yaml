# EFS-005 — EFS FileSystem without FileSystemPolicy — based on cspm/builtinRules/EFS-005 fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: EFS-005 - EFS FileSystem without user-configured FileSystemPolicy (non-compliant)

Resources:
  EfsFileSystemWithoutPolicy:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs-no-policy'
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: EFS-005
