# Lambda-003 Lambda LayerVersionPermission with wildcard Principal based on cspm/builtinRules/Lambda-003 fixture
# Note: This template creates a LayerVersionPermission granting public access.
# A real LayerVersion requires content (S3 or inline). This demonstrates the permission misconfiguration only.
AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda-003 Lambda LayerVersionPermission with Principal '*' (non-compliant)

Resources:
  PublicLayerPermission:
    Type: AWS::Lambda::LayerVersionPermission
    Properties:
      Action: lambda:GetLayerVersion
      LayerVersionArn: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:placeholder-layer:1'
      Principal: '*'
