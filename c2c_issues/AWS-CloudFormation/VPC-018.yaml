# VPC-018 — SG allows unrestricted VNC Server access (tcp/5900) from 0.0.0.0/0 — based on cspm/builtinRules/VPC-018/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'c2c CloudFormation — VPC-018: SG allows unrestricted VNC Server access (tcp/5900) from 0.0.0.0/0'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the security group

Resources:
  C2cVPC018:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} - Unrestricted VNC Server access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5900
          ToPort: 5900
          CidrIp: 0.0.0.0/0
          Description: Unrestricted VNC Server access
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: VPC-018
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC-018'
