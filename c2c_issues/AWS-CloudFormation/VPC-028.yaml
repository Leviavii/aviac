# VPC-028 SG allows unrestricted NetBIOS access (tcp/139) from 0.0.0.0/0 based on cspm/builtinRules/VPC-028/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'c2c CloudFormation VPC-028: SG allows unrestricted NetBIOS access (tcp/139) from 0.0.0.0/0'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the security group

Resources:
  C2cVPC028:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} - Unrestricted NetBIOS TCP access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 139
          ToPort: 139
          CidrIp: 0.0.0.0/0
          Description: Unrestricted NetBIOS TCP access
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: VPC-028
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC-028'
