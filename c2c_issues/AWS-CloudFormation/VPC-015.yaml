# VPC-015 - SG allows unrestricted SSH access (tcp/22) from 0.0.0.0/0 - based on cspm/builtinRules/VPC-015/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'c2c CloudFormation - VPC-015: SG allows unrestricted SSH access (tcp/22) from 0.0.0.0/0'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the security group

Resources:
  C2cVPC015:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} - Unrestricted SSH access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Unrestricted SSH access
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: VPC-015
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC-015'
