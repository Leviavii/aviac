# VPC-025 - SG allows unrestricted FTP Data access (tcp/20) from 0.0.0.0/0 - based on cspm/builtinRules/VPC-025/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'c2c CloudFormation - VPC-025: SG allows unrestricted FTP Data access (tcp/20) from 0.0.0.0/0'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the security group

Resources:
  C2cVPC025:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} - Unrestricted FTP Data access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 20
          ToPort: 20
          CidrIp: 0.0.0.0/0
          Description: Unrestricted FTP Data access
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: VPC-025
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC-025'
