# VPC-017 — SG allows unrestricted VNC Listener access (tcp/5500) from 0.0.0.0/0 — based on cspm/builtinRules/VPC-017/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'c2c CloudFormation — VPC-017: SG allows unrestricted VNC Listener access (tcp/5500) from 0.0.0.0/0'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the security group

Resources:
  C2cVPC017:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} - Unrestricted VNC Listener access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5500
          ToPort: 5500
          CidrIp: 0.0.0.0/0
          Description: Unrestricted VNC Listener access
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: VPC-017
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC-017'
