# VPC-029 SG allows unrestricted PostgreSQL access (tcp/5432) from 0.0.0.0/0 based on cspm/builtinRules/VPC-029/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'c2c CloudFormation VPC-029: SG allows unrestricted PostgreSQL access (tcp/5432) from 0.0.0.0/0'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the security group

Resources:
  C2cVPC029:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} - Unrestricted PostgreSQL access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
          Description: Unrestricted PostgreSQL access
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: VPC-029
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC-029'
