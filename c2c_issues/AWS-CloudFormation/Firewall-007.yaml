# Firewall-007 — SG allows access from wide private network (10.0.0.0/8) — based on cspm/builtinRules/Firewall-007/cloud_formation fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: 'c2c CloudFormation — Firewall-007: SG allows access from wide private network (10.0.0.0/8)'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the security group

Resources:
  C2cFirewall007:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} - Access from wide private network'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.0.0.0/8
          Description: Access from wide private network
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: Firewall-007
        - Key: Name
          Value: !Sub '${AWS::StackName}-Firewall-007'
