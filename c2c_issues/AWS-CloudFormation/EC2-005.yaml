# EC2-005 — EC2 instance without VPC (no SubnetId or NetworkInterfaces) — based on cspm/builtinRules/EC2-005 fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: EC2-005 - EC2 instance launched in EC2-Classic (no VPC) (non-compliant)

Resources:
  InstanceWithoutVpc:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: t3.micro
      Tags:
        - Key: Project
          Value: wiz-c2c-cloudformation
        - Key: Rule
          Value: EC2-005
