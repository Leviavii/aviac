# IDP-001 Cognito IdentityPool allows unauthenticated access based on cspm/builtinRules/IDP-001 fixture
AWSTemplateFormatVersion: '2010-09-09'
Description: IDP-001 Cognito IdentityPool with AllowUnauthenticatedIdentities set to true (non-compliant)

Resources:
  UnauthenticatedIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub '${AWS::StackName}-unauth-pool'
      AllowUnauthenticatedIdentities: true
      AllowClassicFlow: false
